[package]
name = "sellershut-core"
version = "0.1.0"
edition = "2021"

[dependencies]
prost = { version = "0.12.4", optional = true }
prost-types = { version = "0.12.4", optional = true }
serde = { version = "1.0.200", optional = true }
surrealdb-core = { version = "1.4.2", optional = true, default-features = false }
tonic = { version = "0.11.0", optional = true, default-features = false }

[build-dependencies]
tonic-build = "0.11.0"

[features]
default = []
categories = ["tonic"]
users = ["tonic"]
tonic = ["dep:tonic", "tonic/codegen", "tonic/prost", "prost"]
serde = ["dep:serde", "serde/derive"]
surrealdb = ["dep:surrealdb-core"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
  "--cfg",
  "docsrs"
]
